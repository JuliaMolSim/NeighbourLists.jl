name: CI
on:
  push:
    branches:
      - master
      - gpu-support
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.9'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Setup test environment
        shell: bash
        run: |
          # Create a temporary test environment that includes NeighbourLists and all test deps
          mkdir -p /tmp/test_env
          cat > /tmp/test_env/Project.toml << 'EOF'
          [deps]
          NeighbourLists = "2fcf5ba9-9ed4-57cf-b73f-ff513e316b9c"
          Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"
          Distances = "b4f34e82-e78d-54a5-968a-f98e89d6e8f7"
          ForwardDiff = "f6369f11-7733-5829-9624-2563aa707210"
          NearestNeighbors = "b8a86587-4115-5ab1-83bc-aa920d37bbce"
          Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"
          AtomsBuilder = "f5cc8831-eeb7-4288-8d9f-d6c1ddb77004"
          AtomsBase = "a963bdd2-2df7-4f54-a1ee-49d51e6be12a"
          StaticArrays = "90137ffa-7385-5640-81b9-e52037218182"
          LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
          Unitful = "1986cc42-f94f-5a68-af5c-568840ba703d"
          PythonCall = "6099a3de-0909-46bc-b1f4-468b9a2dfc0d"
          CondaPkg = "992eb4ea-22a4-4c89-a5bb-47a3300528ab"
          EOF
          # Copy CondaPkg.toml to test env for matscipy
          cp CondaPkg.toml /tmp/test_env/
      - name: Run tests
        shell: bash
        run: |
          julia --project=/tmp/test_env --color=yes -e '
            using Pkg
            Pkg.develop(path=".")
            Pkg.instantiate()
            # Resolve CondaPkg Python environment (installs matscipy)
            using CondaPkg
            CondaPkg.resolve()
            # Run tests
            cd("'$(pwd)'")
            include("test/runtests.jl")
          '
